name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Warning-only: CI reports anomalies but failures never send "run failed" emails
    # Remove this flag once CI is stabilized and we want hard-fail gating again.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        continue-on-error: true
        run: python -m py_compile $(git ls-files '*.py')

      - name: Import check
        continue-on-error: true
        env:
          SECRET_KEY: ci-test-secret-key-long-enough-for-jwt-signing
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          ANTHROPIC_API_KEY: sk-ant-ci-test
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          ADMIN_TOKEN: ci-admin-token-1234567890abcdef1234567890abcdef
        run: python -c "import main; print('import ok')"

      - name: Run E2E tests
        env:
          SECRET_KEY: ci-test-secret-key-long-enough-for-jwt-signing
          DATABASE_URL: sqlite+aiosqlite:///./vynex_test.db
          ANTHROPIC_API_KEY: sk-ant-ci-test
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          ADMIN_TOKEN: ci-admin-token-1234567890abcdef1234567890abcdef
        run: python tests_e2e.py
        continue-on-error: true  # E2E richiede env reali — non-blocking per PR

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - run: ruff check . --output-format=github
        continue-on-error: true  # warning-only, non-blocking
