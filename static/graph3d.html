<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Caesar — Knowledge Universe</title>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#03060f;overflow:hidden}
  #ui{position:fixed;top:16px;left:18px;color:#00e5ff;font:11px 'Courier New',mono;
      text-shadow:0 0 10px #00e5ff88;pointer-events:none;z-index:10}
  #ui h1{font-size:12px;letter-spacing:4px;margin-bottom:5px}
  #ui p{opacity:.55;font-size:10px;line-height:2}
  #tip{position:fixed;display:none;background:rgba(0,8,24,.93);
       border:1px solid #00e5ff44;color:#00e5ff;padding:8px 14px;
       border-radius:3px;font:11px 'Courier New',mono;pointer-events:none;
       z-index:20;box-shadow:0 0 20px #00e5ff22}
  #legend{position:fixed;bottom:16px;left:18px;font:10px 'Courier New',mono;
          color:#556;pointer-events:none;line-height:2}
  #legend b{display:inline-block;width:9px;height:9px;border-radius:50%;
            margin-right:6px;vertical-align:middle}
</style>
</head>
<body>
<div id="ui">
  <h1>⚔ CAESAR · KNOWLEDGE UNIVERSE</h1>
  <p>Nodi: <span id="nc">—</span> &nbsp;·&nbsp; Sinapsi: <span id="ec">—</span> &nbsp;·&nbsp; FPS: <span id="fps">—</span></p>
</div>
<div id="tip"></div>
<div id="legend">
  <b style="background:#00e5ff;box-shadow:0 0 6px #00e5ff"></b>CORE &nbsp;
  <b style="background:#c084fc;box-shadow:0 0 6px #c084fc"></b>ROBERTO &nbsp;
  <b style="background:#fbbf24;box-shadow:0 0 6px #fbbf24"></b>BUSINESS &nbsp;
  <b style="background:#34d399;box-shadow:0 0 6px #34d399"></b>KNOWLEDGE &nbsp;
  <b style="background:#818cf8;box-shadow:0 0 6px #818cf8"></b>SESSIONI &nbsp;
  <b style="background:#f87171;box-shadow:0 0 6px #f87171"></b>TASKS &nbsp;
  <b style="background:#f472b6;box-shadow:0 0 6px #f472b6"></b>TOOLS
</div>

<script>
const C = {
  CORE:      0x00e5ff,
  ROBERTO:   0xc084fc,
  BUSINESS:  0xfbbf24,
  KNOWLEDGE: 0x34d399,
  SESSIONS:  0x818cf8,
  TASKS:     0xf87171,
  TOOLS:     0xf472b6,
};

const NODES = [
  {id:'HOME',       l:'HOME',                    c:'CORE',      s:2.6},
  {id:'identity',   l:'Identity',                c:'CORE',      s:2.0},
  {id:'evolution',  l:'Evolution',               c:'CORE',      s:1.9},
  {id:'laws',       l:'Laws',                    c:'CORE',      s:1.7},
  {id:'profile',    l:'Profile',                 c:'ROBERTO',   s:1.6},
  {id:'feedback',   l:'Feedback',                c:'ROBERTO',   s:1.4},
  {id:'agentia',    l:'VisitAI',                 c:'BUSINESS',  s:2.2},
  {id:'edgebet',    l:'EdgeBet AI',              c:'BUSINESS',  s:1.9},
  {id:'growth',     l:'Growth Marketer',         c:'BUSINESS',  s:1.7},
  {id:'game10',     l:'Game 10 Anni',            c:'BUSINESS',  s:1.5},
  {id:'stato',      l:'Stato Attuale',           c:'BUSINESS',  s:1.4},
  {id:'piano10b',   l:'Piano 10B',               c:'BUSINESS',  s:1.5},
  {id:'capital',    l:'Capital Markets',         c:'BUSINESS',  s:1.3},
  {id:'entsales',   l:'Enterprise Sales',        c:'BUSINESS',  s:1.3},
  {id:'claude_biz', l:'Claude Code AI Business', c:'KNOWLEDGE', s:2.3},
  {id:'a2a',        l:'A2A Protocol',            c:'KNOWLEDGE', s:1.4},
  {id:'ai_aug',     l:'AI Augmented Gen',        c:'KNOWLEDGE', s:1.4},
  {id:'autogen',    l:'AutoGen',                 c:'KNOWLEDGE', s:1.4},
  {id:'metrics',    l:'Business Metrics',        c:'KNOWLEDGE', s:1.5},
  {id:'ctx_rot',    l:'Context Rot',             c:'KNOWLEDGE', s:1.2},
  {id:'crewai',     l:'CrewAI',                  c:'KNOWLEDGE', s:1.4},
  {id:'eu_ai',      l:'EU AI Act',               c:'KNOWLEDGE', s:1.3},
  {id:'kindex',     l:'Knowledge Index',         c:'KNOWLEDGE', s:1.8},
  {id:'infra',      l:'Infra Production',        c:'KNOWLEDGE', s:1.5},
  {id:'rag',        l:'LangChain RAG',           c:'KNOWLEDGE', s:1.4},
  {id:'langgraph',  l:'LangGraph',               c:'KNOWLEDGE', s:1.6},
  {id:'mcp',        l:'MCP Protocols',           c:'KNOWLEDGE', s:1.4},
  {id:'mental',     l:'Mental Models',           c:'KNOWLEDGE', s:1.4},
  {id:'multimodal', l:'Multimodal AI',           c:'KNOWLEDGE', s:1.4},
  {id:'playwright', l:'Playwright',              c:'KNOWLEDGE', s:1.3},
  {id:'postgres',   l:'PostgreSQL Adv',          c:'KNOWLEDGE', s:1.3},
  {id:'prod_sys',   l:'Production Systems',      c:'KNOWLEDGE', s:1.5},
  {id:'scaling',    l:'Scaling Business',        c:'KNOWLEDGE', s:1.5},
  {id:'security',   l:'Security Ops',            c:'KNOWLEDGE', s:1.3},
  {id:'shadow',     l:'Shadow Work',             c:'KNOWLEDGE', s:1.2},
  {id:'sistemi',    l:'Sistemi Reali',           c:'KNOWLEDGE', s:1.3},
  {id:'stripe_n8n', l:'Stripe + N8N',            c:'KNOWLEDGE', s:1.5},
  {id:'terraform',  l:'Terraform + Kafka',       c:'KNOWLEDGE', s:1.4},
  {id:'web3',       l:'Web3 Fondamenti',         c:'KNOWLEDGE', s:1.4},
  {id:'s0320',      l:'Sessione 20/3',           c:'SESSIONS',  s:1.1},
  {id:'s0322',      l:'Sessione 22/3',           c:'SESSIONS',  s:1.1},
  {id:'s0323',      l:'Sessione 23/3',           c:'SESSIONS',  s:1.2},
  {id:'active',     l:'Tasks Attivi',            c:'TASKS',     s:1.4},
  {id:'backlog',    l:'Backlog',                 c:'TASKS',     s:1.2},
  {id:'tools_idx',  l:'Tools Index',             c:'TOOLS',     s:1.4},
  {id:'kgraph',     l:'Knowledge Graph',         c:'TOOLS',     s:2.0},
];

const EDGES = [
  ['HOME','identity'],['HOME','evolution'],['HOME','laws'],
  ['HOME','profile'],['HOME','agentia'],['HOME','edgebet'],
  ['HOME','growth'],['HOME','kindex'],['HOME','active'],
  ['HOME','kgraph'],['HOME','claude_biz'],['HOME','stato'],
  ['identity','evolution'],['identity','laws'],['evolution','laws'],
  ['identity','profile'],['profile','feedback'],['feedback','evolution'],
  ['agentia','stripe_n8n'],['agentia','infra'],['agentia','prod_sys'],
  ['agentia','metrics'],['agentia','claude_biz'],['agentia','stato'],
  ['edgebet','stripe_n8n'],['edgebet','infra'],['edgebet','stato'],
  ['growth','playwright'],['growth','multimodal'],['growth','claude_biz'],
  ['game10','capital'],['game10','scaling'],['game10','piano10b'],['game10','stato'],
  ['piano10b','capital'],['piano10b','scaling'],['piano10b','entsales'],
  ['entsales','scaling'],['entsales','capital'],
  ['claude_biz','langgraph'],['claude_biz','stripe_n8n'],['claude_biz','prod_sys'],
  ['claude_biz','scaling'],['claude_biz','multimodal'],['claude_biz','a2a'],
  ['claude_biz','autogen'],['claude_biz','crewai'],['claude_biz','kindex'],
  ['langgraph','rag'],['langgraph','a2a'],['langgraph','autogen'],['langgraph','crewai'],
  ['rag','postgres'],['rag','terraform'],
  ['a2a','mcp'],['a2a','prod_sys'],
  ['infra','postgres'],['infra','terraform'],['infra','prod_sys'],['infra','security'],
  ['prod_sys','stripe_n8n'],['prod_sys','security'],
  ['multimodal','ai_aug'],['multimodal','playwright'],
  ['metrics','scaling'],['metrics','prod_sys'],
  ['scaling','mental'],['scaling','shadow'],
  ['security','eu_ai'],['mcp','playwright'],['mcp','ctx_rot'],
  ['web3','capital'],['web3','security'],
  ['sistemi','prod_sys'],['sistemi','infra'],['sistemi','langgraph'],['sistemi','crewai'],
  ['kindex','a2a'],['kindex','langgraph'],['kindex','infra'],
  ['kindex','multimodal'],['kindex','stripe_n8n'],['kindex','claude_biz'],
  ['s0320','identity'],['s0320','growth'],
  ['s0322','agentia'],['s0322','edgebet'],
  ['s0323','claude_biz'],['s0323','agentia'],['s0323','kgraph'],
  ['active','agentia'],['active','growth'],
  ['backlog','game10'],['backlog','piano10b'],
  ['tools_idx','playwright'],['tools_idx','growth'],
  ['kgraph','kindex'],['kgraph','HOME'],['kgraph','claude_biz'],
  ['ctx_rot','identity'],
];

// ── Scene ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03060f);
// NO FOG — causa la sparizione allo zoom out

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.5, 5000);
camera.position.set(0, 30, 110);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor  = 0.06;
controls.autoRotate     = true;
controls.autoRotateSpeed = 0.3;
controls.minDistance    = 10;
controls.maxDistance    = 500; // permette zoom out molto lontano
controls.zoomSpeed      = 1.2;

// ── Force layout ──────────────────────────────────────────────────────────
const pos = {};
NODES.forEach(n => {
  const t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1), r=30+Math.random()*20;
  pos[n.id]={x:r*Math.sin(p)*Math.cos(t),y:r*Math.sin(p)*Math.sin(t),z:r*Math.cos(p),vx:0,vy:0,vz:0};
});
(function sim(steps=150){
  const ns=Object.values(pos);
  for(let s=0;s<steps;s++){
    for(let i=0;i<ns.length;i++) for(let j=i+1;j<ns.length;j++){
      const a=ns[i],b=ns[j],dx=b.x-a.x,dy=b.y-a.y,dz=b.z-a.z;
      const d=Math.sqrt(dx*dx+dy*dy+dz*dz)+.01,f=200/(d*d),r=f/d;
      a.vx-=dx*r;a.vy-=dy*r;a.vz-=dz*r;
      b.vx+=dx*r;b.vy+=dy*r;b.vz+=dz*r;
    }
    EDGES.forEach(([ai,bi])=>{
      const a=pos[ai],b=pos[bi];if(!a||!b)return;
      const dx=b.x-a.x,dy=b.y-a.y,dz=b.z-a.z;
      const d=Math.sqrt(dx*dx+dy*dy+dz*dz)+.01,f=(d-16)*.045/d;
      a.vx+=dx*f;a.vy+=dy*f;a.vz+=dz*f;
      b.vx-=dx*f;b.vy-=dy*f;b.vz-=dz*f;
    });
    ns.forEach(n=>{
      n.vx-=n.x*.0025;n.vy-=n.y*.0025;n.vz-=n.z*.0025;
      n.vx*=.80;n.vy*=.80;n.vz*=.80;
      n.x+=n.vx;n.y+=n.vy;n.z+=n.vz;
    });
  }
})();

// ── Nodes ─────────────────────────────────────────────────────────────────
const meshes=[], meshMap={};
NODES.forEach(n=>{
  const col=C[n.c], p=pos[n.id];

  // Core sphere — più grande e più luminoso
  const mat=new THREE.MeshStandardMaterial({
    color:col, emissive:col, emissiveIntensity:1.0,
    roughness:.1, metalness:.8,
  });
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(n.s*.7,24,24), mat);
  mesh.position.set(p.x,p.y,p.z);
  mesh.userData={id:n.id,label:n.l,cluster:n.c,baseEI:1.0};
  scene.add(mesh);
  meshes.push(mesh);
  meshMap[n.id]=mesh;

  // Halo grande e visibile
  const halo=new THREE.Mesh(
    new THREE.SphereGeometry(n.s*2.2,16,16),
    new THREE.MeshBasicMaterial({
      color:col,transparent:true,opacity:.12,
      side:THREE.BackSide,blending:THREE.AdditiveBlending,depthWrite:false
    })
  );
  mesh.add(halo);

  // Second halo (double glow)
  const halo2=new THREE.Mesh(
    new THREE.SphereGeometry(n.s*1.4,16,16),
    new THREE.MeshBasicMaterial({
      color:col,transparent:true,opacity:.2,
      side:THREE.BackSide,blending:THREE.AdditiveBlending,depthWrite:false
    })
  );
  mesh.add(halo2);

  // Point light su tutti i nodi grandi
  if(n.s>=1.5){
    const pl=new THREE.PointLight(col,1.5,28);
    mesh.add(pl);
  }
});

// ── Edges — più spesse e luminose ─────────────────────────────────────────
EDGES.forEach(([ai,bi])=>{
  const a=pos[ai],b=pos[bi];if(!a||!b)return;
  const col=C[NODES.find(n=>n.id===ai)?.c||'CORE'];

  // Linea principale — opacità alta
  const pts=[new THREE.Vector3(a.x,a.y,a.z),new THREE.Vector3(b.x,b.y,b.z)];
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({
      color:col,transparent:true,opacity:.55,
      blending:THREE.AdditiveBlending,depthWrite:false
    })
  ));

  // Linea glow sovrapposta (più larga visivamente)
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({
      color:col,transparent:true,opacity:.18,
      blending:THREE.AdditiveBlending,depthWrite:false
    })
  ));
});

// ── Stars ──────────────────────────────────────────────────────────────────
{
  const sv=[];
  for(let i=0;i<4000;i++) sv.push((Math.random()-.5)*1200,(Math.random()-.5)*1200,(Math.random()-.5)*1200);
  const sg=new THREE.BufferGeometry();
  sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({
    color:0xffffff,size:.3,transparent:true,opacity:.4,
    sizeAttenuation:true
  })));
}

// ── Lights ────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a2a4a,.8));

// ── Stats ─────────────────────────────────────────────────────────────────
document.getElementById('nc').textContent=NODES.length;
document.getElementById('ec').textContent=EDGES.length;

// ── Raycast / tooltip ─────────────────────────────────────────────────────
const rc=new THREE.Raycaster();
rc.params.Points={threshold:2};
const mouse=new THREE.Vector2();
const tip=document.getElementById('tip');
let hovered=null;

window.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  tip.style.left=(e.clientX+16)+'px';
  tip.style.top=(e.clientY-8)+'px';
});

// ── Animation ─────────────────────────────────────────────────────────────
let t=0,frames=0,lastFT=performance.now();

function animate(){
  requestAnimationFrame(animate);
  t+=.016;frames++;
  const now=performance.now();
  if(now-lastFT>1000){document.getElementById('fps').textContent=frames;frames=0;lastFT=now;}

  // Neuron pulse — variazione più accentuata
  meshes.forEach((m,i)=>{
    const pulse=.7+.3*Math.sin(t*1.8+i*.65);
    m.material.emissiveIntensity=m.userData.baseEI*pulse;
    m.scale.setScalar(.96+.04*pulse);
  });

  // Raycast
  rc.setFromCamera(mouse,camera);
  const hits=rc.intersectObjects(meshes);
  if(hits.length){
    const m=hits[0].object;
    if(m!==hovered){if(hovered)hovered.userData.baseEI=1.0;hovered=m;m.userData.baseEI=2.5;}
    tip.style.display='block';
    tip.innerHTML=`<b>${m.userData.label}</b><br><span style="opacity:.45;font-size:9px">${m.userData.cluster}</span>`;
  } else {
    if(hovered){hovered.userData.baseEI=1.0;hovered=null;}
    tip.style.display='none';
  }

  controls.update();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
