<div id="vynex-exit-intent" style="display:none;position:fixed;inset:0;background:rgba(4,6,15,0.92);z-index:99998;align-items:center;justify-content:center;backdrop-filter:blur(10px);padding:24px">
  <div style="max-width:460px;width:100%;background:linear-gradient(160deg,#0f172a,#1e293b);border:1px solid rgba(96,165,250,0.3);border-radius:20px;padding:40px 32px;text-align:center;position:relative">
    <button id="vynex-exit-close" type="button" aria-label="Chiudi" style="position:absolute;top:12px;right:12px;background:none;border:none;color:#64748b;font-size:24px;cursor:pointer;width:36px;height:36px;border-radius:8px">×</button>
    <div style="display:inline-block;padding:6px 14px;background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.3);border-radius:999px;color:#60a5fa;font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:20px">ASPETTA</div>
    <h2 style="font-size:26px;font-weight:800;color:#f1f5f9;line-height:1.2;margin:0 0 14px">Prima di andare…</h2>
    <p style="color:#cbd5e1;font-size:15px;line-height:1.6;margin:0 0 24px">Prova VYNEX gratis. Descrivi una visita, ricevi <strong style="color:#fff">3 documenti pronti in 30 secondi</strong>. Zero account, zero carta.</p>
    <a href="/demo" style="display:inline-block;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;padding:14px 32px;border-radius:12px;text-decoration:none;font-weight:700;font-size:15px;letter-spacing:0.3px">Provo la demo →</a>
    <p style="color:#64748b;font-size:11px;margin:20px 0 0">Ci vogliono 30 secondi. Poi decidi tu.</p>
  </div>
</div>

<script>
(function(){
  var KEY = 'vynex_exit_intent_dismissed';
  if (sessionStorage.getItem(KEY)) return;
  if (window.location.pathname === '/demo' || window.location.pathname.indexOf('/demo/') === 0) return;
  if (window.location.pathname.indexOf('/dashboard') === 0) return;
  if (window.location.pathname.indexOf('/genera') === 0) return;
  if (window.location.pathname.indexOf('/account') === 0) return;

  var overlay = document.getElementById('vynex-exit-intent');
  var closeBtn = document.getElementById('vynex-exit-close');
  if (!overlay || !closeBtn) return;

  function show(){
    overlay.style.display = 'flex';
    sessionStorage.setItem(KEY, '1');
  }
  function hide(){
    overlay.style.display = 'none';
  }
  closeBtn.addEventListener('click', hide);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) hide(); });

  // Trigger 1: mouse leaves viewport from top (desktop)
  document.addEventListener('mouseleave', function(e){
    if (e.clientY <= 0 && !sessionStorage.getItem(KEY)) show();
  });
  // Trigger 2: fallback after 45s engagement (mobile can't detect mouseleave)
  setTimeout(function(){ if (!sessionStorage.getItem(KEY)) show(); }, 45000);
})();
</script>
