<script>
(function(){
  var burger = document.getElementById('nav-burger');
  var menu = document.getElementById('nav-mobile-menu');
  if (burger && menu) {
    var open = false;
    burger.addEventListener('click', function(){
      open = !open;
      menu.style.display = open ? 'block' : 'none';
      burger.setAttribute('aria-label', open ? 'Chiudi menu' : 'Apri menu');
    });
    document.addEventListener('click', function(e){
      if (open && !menu.contains(e.target) && !burger.contains(e.target)) {
        open = false;
        menu.style.display = 'none';
      }
    });
  }

  // Active page highlight: flag current nav link with aria-current="page"
  var path = window.location.pathname.replace(/\/$/, '') || '/';
  document.querySelectorAll('.vnx-nav a[href]').forEach(function(a){
    var href = a.getAttribute('href').replace(/\/$/, '') || '/';
    if (href === path || (href !== '/' && path.indexOf(href) === 0)) {
      a.setAttribute('aria-current', 'page');
    }
  });
})();
</script>
